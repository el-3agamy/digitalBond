<div class="modal-overlay" (click)="onOverlayClick($event)">
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <!-- Close Button -->
        <button class="modal-close" (click)="onClose()" aria-label="Close modal">
            <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>

        <!-- Success Animation -->
        <div class="success-icon">
            <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
        </div>

        <h3 id="modal-title">Message Sent!</h3>
        <p>Thank you for reaching out. We've received your message and will get back to you within 24 hours.</p>

        <button class="modal-btn" (click)="onClose()">
            <span>Got It</span>
        </button>
    </div>
</div>
